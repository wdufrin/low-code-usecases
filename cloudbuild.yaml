steps:
  # 1. Install & Build Frontend
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['install']
    dir: 'frontend'
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'build']
    dir: 'frontend'

  # 2. Consolidate Assets to Backend
  - name: 'alpine'
    entrypoint: 'sh'
    args: ['-c', 'mkdir -p backend/public && cp -rf frontend/dist/* backend/public/']

  # 3. Build Docker Image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/agent-architect:$COMMIT_SHA', '.']
    dir: 'backend'

  # 4. Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/agent-architect:$COMMIT_SHA']

  # 5. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'agent-architect'
      - '--image'
      - 'gcr.io/$PROJECT_ID/agent-architect:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/agent-architect:$COMMIT_SHA'
timeout: '1200s'
options:
  logging: CLOUD_LOGGING_ONLY
